# Reqired by Electron Forge
nodeLinker: hoisted

allowBuilds:
  '@sentry/cli': true
  electron: true
  electron-winstaller: true
  esbuild: true
  fs-xattr: true
  macos-alias: true
  unrs-resolver: true

overrides:
  'esbuild': '^0.27.0'
  'nan': '^2.25.0'
  'basic-ftp': '^5.2.0'
  'tar': '^7.5.13'
  'dompurify': '^3.4.0'

  # Electron Forge uses an old version of @electron/rebuild which has a github dependency on
  # the now deprecated @electron/node-gyp. Until Electron Forge updates the dependency (which
  # will probably not happen until 8.0.0) we need to have override this.
  '@electron/node-gyp': 'npm:node-gyp@12.3.0'

patchedDependencies:
  rrweb: patches/rrweb.patch

minimumReleaseAgeExclude:
  - '@typescript/native-preview-darwin-arm64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-darwin-x64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-linux-arm64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-linux-arm@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-linux-x64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-win32-arm64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-win32-x64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview@7.0.0-dev.20260609.1'

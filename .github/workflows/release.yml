name: 'Manual Release'

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag, branch, or SHA to build (e.g. v1.14.0). Use for re-runs or recovery."
        required: true
        type: string

permissions: {}

concurrency:
  group: build-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/release-base.yml
    with:
      ref: ${{ inputs.ref }}
    secrets: inherit

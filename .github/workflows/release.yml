name: 'Manual Release'

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.14.0). Fallback for re-runs.'
        required: true
        type: string

permissions: {}

concurrency:
  group: build-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/release-base.yml
    with:
      ref: ${{ inputs.ref }}
    secrets: inherit

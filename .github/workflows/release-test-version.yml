name: 'Manual Release Test Version'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Specify a version suffix for the test release (limit to 20
          characters or windows build will fail)'
        required: true
        type: string
        default: 'test-version'

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version suffix
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[a-zA-Z0-9._-]{1,20}$ ]]; then
            echo "::error::version must match ^[a-zA-Z0-9._-]{1,20}$"
            exit 1
          fi

  release:
    needs: validate
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/release-base.yml
    with:
      version-suffix: ${{ inputs.version }}
    secrets: inherit
